name: Daily upstream check

on:
  workflow_dispatch:
  schedule:
    - cron: "17 13 * * *"

permissions:
  contents: read

jobs:
  check-upstream:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Check whether upstream has new commits
        run: |
          git remote add upstream https://github.com/pingdotgg/t3code.git
          git fetch --prune upstream main
          counts="$(git rev-list --left-right --count HEAD...upstream/main)"
          local_ahead="$(printf '%s' "$counts" | awk '{print $1}')"
          upstream_ahead="$(printf '%s' "$counts" | awk '{print $2}')"
          {
            echo "## T3 Code upstream check"
            echo "- Fork SHA: $(git rev-parse HEAD)"
            echo "- Upstream SHA: $(git rev-parse upstream/main)"
            echo "- Fork-only commits: $local_ahead"
            echo "- Incoming upstream commits: $upstream_ahead"
          } >> "$GITHUB_STEP_SUMMARY"
          if [ "$upstream_ahead" -eq 0 ]; then
            echo "Fork already contains upstream/main."
            exit 0
          fi
          git log --oneline HEAD..upstream/main
          echo "Upstream has $upstream_ahead new commit(s). Run the guarded in-app updater."
          exit 1
